<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interférences</title>
  <link rel="stylesheet" href="interferences.css">
</head>
<body>

  <header>
    <h1>Interférences</h1>
    <p class="subtitle">Carnet musique &amp; écriture — Asven × claude.ai</p>
  </header>

  <section class="site-section" id="journal">
    <h2>🎙️ Journal</h2>
    <div class="section-content" id="journal-list">
      
      <article class="journal-entry">
        <div class="entry-toggle" data-src="journal/2026-04-05-ce-qui-reste-du-bruit-1997-2026.html">
          <span class="entry-date">5 avril 2026</span>
          <div class="entry-toggle-grid">
            <span class="entry-title">Ce qui reste du bruit. 1997–2026.</span>
            <span class="toggle-hint">ouvrir</span>
          </div>
        </div>
        <div class="entry-content"></div>
      </article>

    </div>
  </section>

  <section class="site-section" id="rotations">
    <h2>📻 En rotation</h2>
    <div class="section-content" id="rotations-content">
      <p class="loading">chargement…</p>
    </div>
  </section>

  <script>
    // 1. Chargement des sections fixes (Rotations, etc.)
    function loadSection(contentId, src) {
      const container = document.getElementById(contentId);
      if (!container) return;

      fetch(src)
        .then(r => r.text())
        .then(html => {
          const parser = new DOMParser();
          const doc = parser.parseFromString(html, 'text/html');
          const main = doc.querySelector('main') || doc.querySelector('section');
          if (main) {
            container.innerHTML = main.innerHTML;
          }
        })
        .catch(() => {
          container.innerHTML = '<p class="observation-plain">— Erreur de chargement.</p>';
        });
    }

    loadSection('rotations-content', 'rotations/rotations.html');

    // 2. Gestion dynamique du Journal
    document.querySelectorAll('.entry-toggle').forEach(toggle => {
      const container = toggle.closest('.journal-entry');
      const content = container.querySelector('.entry-content');
      const hint = toggle.querySelector('.toggle-hint');
      const src = toggle.dataset.src;

      hint.textContent = 'ouvrir →';

      toggle.addEventListener('click', () => {
        const isOpen = content.classList.contains('open');

        if (isOpen) {
          content.classList.remove('open');
          toggle.classList.remove('open');
          hint.textContent = 'ouvrir →';
          return;
        }

        content.classList.add('open');
        toggle.classList.add('open');
        hint.textContent = 'réduire ↓';

        if (content._loaded) return;
        content._loaded = true;
        content.innerHTML = '<p class="loading">chargement…</p>';

        fetch(src)
          .then(r => r.text())
          .then(html => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const main = doc.querySelector('main');
            if (main) {
              // On injecte directement le contenu du <main> qui contient
              // déjà les classes .author-voice et .ai-voice
              content.innerHTML = main.innerHTML;
            }
          })
          .catch(() => {
            content.innerHTML = '<p class="observation-plain">— Erreur de chargement.</p>';
          });
      });
    });    
  </script>

</body>
</html>
